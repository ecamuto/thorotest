<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ThoroTest — Test management</title>

<!-- Fonts are vendored locally (frontend/fonts/) — no external requests -->
<link rel="stylesheet" href="fonts.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<!-- React (production UMD, vendored from node_modules at build time) -->
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="react-globals.js"></script>

<!-- i18n: core engine (must load before locales) -->
<script src="i18n.js"></script>
<!-- i18n: locales — add a new <script> here to support a new language -->
<script src="locales/en.js"></script>
<script src="locales/it.js"></script>
<script src="locales/de.js"></script>
<script src="locales/es.js"></script>
<script src="locales/fr.js"></script>

<!-- Data (static fallback) + live API loader -->
<script src="data.js"></script>
<script src="api.js"></script>
<script src="components/tweaks-panel.js"></script>
<script src="components/i18n-context.js"></script>

<!-- Icons + shell + hooks + views -->
<script src="components/icons.js"></script>
<script src="components/app-shell.js"></script>
<script src="components/hooks.js"></script>
<script src="components/change-history.js"></script>
<script src="views/view-overview.js"></script>
<script src="views/view-library.js"></script>
<script src="views/view-test-detail.js"></script>
<script src="views/view-runs.js"></script>
<script src="views/view-defects.js"></script>
<script src="views/view-requirements.js"></script>
<script src="views/view-misc.js"></script>
<script src="views/view-config.js"></script>
<script src="views/view-login.js"></script>
<script src="views/view-settings.js"></script>
<script src="views/view-docs.js"></script>
<script src="views/view-import.js"></script>
<script src="views/view-admin.js"></script>
<script src="views/view-audit-log.js"></script>
<script src="views/view-my-work.js"></script>
<script src="components/notification-bell.js"></script>

<!-- Main app -->
<script src="app.js"></script>
</body>
</html>
