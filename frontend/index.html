<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ThoroTest — Open-source test management</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- i18n: core engine (must load before locales) -->
<script src="i18n.js"></script>
<!-- i18n: locales — add a new <script> here to support a new language -->
<script src="locales/en.js"></script>
<script src="locales/it.js"></script>
<script src="locales/de.js"></script>
<script src="locales/es.js"></script>
<script src="locales/fr.js"></script>

<!-- Data (static fallback) + live API loader -->
<script src="data.js"></script>
<script src="api.js"></script>
<script type="text/babel" src="components/tweaks-panel.jsx"></script>
<script type="text/babel" src="components/i18n-context.jsx"></script>

<!-- Icons + shell + hooks + views -->
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/app-shell.jsx"></script>
<script type="text/babel" src="components/hooks.jsx"></script>
<script type="text/babel" src="views/view-overview.jsx"></script>
<script type="text/babel" src="views/view-library.jsx"></script>
<script type="text/babel" src="views/view-test-detail.jsx"></script>
<script type="text/babel" src="views/view-runs.jsx"></script>
<script type="text/babel" src="views/view-defects.jsx"></script>
<script type="text/babel" src="views/view-misc.jsx"></script>
<script type="text/babel" src="views/view-config.jsx"></script>
<script type="text/babel" src="views/view-login.jsx"></script>
<script type="text/babel" src="views/view-settings.jsx"></script>
<script type="text/babel" src="views/view-docs.jsx"></script>
<script type="text/babel" src="views/view-import.jsx"></script>
<script type="text/babel" src="views/view-admin.jsx"></script>
<script type="text/babel" src="views/view-audit-log.jsx"></script>
<script type="text/babel" src="views/view-my-work.jsx"></script>
<script type="text/babel" src="components/notification-bell.jsx"></script>

<!-- Main app -->
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
