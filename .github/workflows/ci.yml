name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to the same ref cancels the previous in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Create venv + install deps
        run: |
          python -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt
      - name: Run pytest
        run: ./venv/bin/pytest backend/tests/ -q

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Create venv + install backend deps
        run: |
          python -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt
      - name: Install node deps
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      # playwright.config.ts boots its own isolated server (e2e.db, rate-limit off).
      # CI=true => clean server (no reuse), forbidOnly, 1 retry.
      - name: Run Playwright suite
        run: npx playwright test
        env:
          CI: 'true'
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
