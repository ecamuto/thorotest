name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:      # lets ThoroTest (Configure ▸ Integrations ▸ Run CI) trigger this

# A new push to the same ref cancels the previous in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Create venv + install deps
        run: |
          python -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.lock
      - name: README badge counts match the tree
        run: python3 scripts/update-badges.py --check
      - name: Run pytest → JUnit XML
        run: ./venv/bin/pytest backend/tests/ -q --junitxml=junit.xml
      - name: Upload JUnit artifact
        # `!cancelled()` runs even if pytest failed, so results publish while
        # the job still goes red — the CI gate is preserved.
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: junit                     # ThoroTest's default "JUnit artifact" name
          path: junit.xml

  deps-audit:
    name: Dependency CVE scan (pip-audit)
    runs-on: ubuntu-latest
    # Report-only for now: new advisories in transitive deps shouldn't block
    # unrelated PRs. Dependabot opens the fix PRs; tighten to blocking later.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: pip-audit against the lock
        # --ignore-vuln PYSEC-2026-1325: ecdsa (transitive via python-jose) has
        # no fixed release — upstream considers pure-python timing side channels
        # out of scope. Revisit if python-jose is replaced (e.g. PyJWT).
        run: pipx run pip-audit -r requirements.lock --ignore-vuln PYSEC-2026-1325

  cli:
    name: CLI tests (node:test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      # The CLI has zero dependencies — no npm ci, just the runtime.
      - name: Run CLI test suite
        run: node --test test/
        working-directory: cli

  e2e:
    name: End-to-end tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
      - name: Create venv + install backend deps
        run: |
          python -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install -r requirements.lock
      - name: Install node deps
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      # playwright.config.ts boots its own isolated server (e2e.db, rate-limit off).
      # CI=true => clean server (no reuse), forbidOnly, 1 retry.
      - name: Run Playwright suite → JUnit XML
        run: npx playwright test --reporter=list,html,junit
        env:
          CI: 'true'
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: junit-e2e.xml
      - name: Upload JUnit artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: junit-e2e                 # set the integration's "JUnit artifact" to this to import e2e
          path: junit-e2e.xml
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
